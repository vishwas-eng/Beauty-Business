<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131A48"/>
      <stop offset="100%" stop-color="#1e2a6b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="10" fill="url(#bgGrad)"/>
  <!-- Orange accent bar — bottom stroke of the L -->
  <rect x="10" y="27" width="20" height="4" rx="2" fill="#FF5800"/>
  <!-- Vertical stroke of the L -->
  <rect x="10" y="9" width="5" height="22" rx="2" fill="white"/>
</svg>
